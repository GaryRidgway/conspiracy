<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infinite Whiteboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="viewport">
    <div id="world"></div>
  </div>

  <div id="toolbar">
    <span class="brand">Infinite Whiteboard<span class="dot">.</span></span>
    <button class="btn primary" id="addCard">+ Card</button>
    <button class="btn" id="addFrame">+ Frame</button>
    <button class="btn" id="fitContent">Fit</button>
    <button class="btn" id="exportBtn">Export</button>
    <button class="btn" id="importBtn">Import</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden>
    <button class="btn" id="resetView">Reset view</button>
    <button class="btn" id="clearBoard">Clear</button>
  </div>

  <div id="status">
    <span id="coords">x: 0  y: 0</span>
    <span class="save" id="saveState">saved</span>
  </div>

  <div id="hint">
    <kbd>drag</kbd> to pan · <kbd>⌘/Ctrl+scroll</kbd> or pinch to zoom · <kbd>dbl-click</kbd> for a card · drag a node's edge <kbd>port</kbd> to connect · <kbd>dbl-click</kbd> a frame to interact · <kbd>Del</kbd> removes selected
  </div>

  <div id="zoombar">
    <button class="zoom-btn" id="zoomOut" title="Zoom out"><span class="icon icon-remove"></span></button>
    <button class="zoom-val" id="zoomReset" title="Reset to 100%">100%</button>
    <button class="zoom-btn" id="zoomIn" title="Zoom in"><span class="icon icon-add"></span></button>
    <button class="zoom-btn" id="zoomFit" title="Fit to content"><span class="icon icon-fit_screen"></span></button>
  </div>

  <!-- Floating rich-text toolbar (positioned above the focused card) -->
  <div id="text-toolbar" class="hidden">
    <button type="button" class="tt-btn" data-cmd="bold" title="Bold"><span class="icon icon-format_bold"></span></button>
    <button type="button" class="tt-btn" data-cmd="italic" title="Italic"><span class="icon icon-format_italic"></span></button>
    <button type="button" class="tt-btn" data-cmd="insertUnorderedList" title="Bulleted list"><span class="icon icon-format_list_bulleted"></span></button>
    <button type="button" class="tt-btn" data-cmd="insertOrderedList" title="Numbered list"><span class="icon icon-format_list_numbered"></span></button>
    <button type="button" class="tt-btn" id="tt-link" title="Link to a node"><span class="icon icon-add_link"></span></button>
  </div>

  <!-- Node picker popup (for inserting an inline link) -->
  <div id="node-picker" class="hidden">
    <input id="np-filter" type="text" placeholder="Link to…" autocomplete="off" spellcheck="false">
    <div id="np-list"></div>
  </div>

  <!-- Themed iframe-creation modal (replaces the native prompt) -->
  <div id="frame-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="frame-modal-title">
      <h2 id="frame-modal-title">Embed a web page</h2>
      <label class="modal-label" for="frame-url">URL</label>
      <input id="frame-url" type="text" placeholder="https://example.com"
             autocomplete="off" autocapitalize="off" spellcheck="false">
      <p class="modal-note">Many sites block embedding (X-Frame-Options / CSP) and will show blank.</p>
      <div class="modal-actions">
        <button class="btn" id="frame-cancel">Cancel</button>
        <button class="btn primary" id="frame-add">Add frame</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
